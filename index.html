<!DOCTYPE html>
<html lang="en">
<head>
  <title>Rock Hard Geology Conglomerate</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Geology">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Body — matches original #122738 dark blue ── */
    body {
      background-color: #122738;
      background-position: top;
      background-repeat: repeat-x;
      color: #445D6D;
      font-family: Tahoma, Geneva, sans-serif;
      min-height: 100vh;
    }

    /* ── Links — original colours preserved ── */
    a:link    { color: blue; }
    a:visited { color: blue; }
    a:hover   { color: #8a1c0f; }
    a:active  { color: yellow; }

    a:hover img { border: 1px solid blue; }

    /* ── Nav bar at top ── */
    nav {
      width: 100%;
      text-align: center;
      padding: 0.6em 0;
      font-size: 0.95em;
      line-height: 150%;
    }

    /* ── Container ── */
    div.container {
      margin: 0 auto;
      width: 100%;
      max-width: 960px;
      line-height: 150%;
      text-align: center;
      padding: 1em;
    }

    /* ── Content box — original dotted border + grey bg ── */
    div.content {
      border: medium dotted black;
      border-radius: 10px;
      padding: 1em;
      margin: 0 auto;
      color: black;
      background-color: #cccccc;
      width: auto;
    }

    div.content span {
      display: block;
    }

    div.content img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* ── Typography ── */
    h1 {
      text-align: left;
      font-size: 200%;
      text-decoration: underline;
      color: black;
    }
    h2 {
      text-align: left;
      font-size: 165%;
      text-decoration: underline;
    }
    h3 { text-align: center; font-size: 110%; }

    p.left {
      text-align: left;
      text-indent: 1cm;
      color: black;
      font-size: 1em;
    }
    p.links  { text-align: left; color: white; }
    p.center { text-align: center; color: white; }
    p.small {
      line-height: 90%;
      font-size: 95%;
      text-align: left;
      text-indent: 1cm;
      color: white;
    }
    p.smaller {
      line-height: 90%;
      font-size: 75%;
      text-align: left;
      text-indent: 2cm;
      color: gray;
      text-decoration: underline;
    }

    /* ── Image gallery ── */
    div.img {
      display: inline-block;
      vertical-align: top;
      margin: 2px;
      height: 250px;
      width: auto;
      text-align: center;
    }
    div.img img {
      display: inline;
      margin: 3px;
      border: 1px solid #cccccc;
      height: 100%;
      width: auto;
    }
    div.desc {
      text-align: center;
      font-weight: normal;
      color: black;
      width: 200px;
      margin: 2px;
    }

    /* ── Login form ── */
    .login-form {
      width: 300px;
      margin: 0 auto;
    }
    .login-form h1 {
      text-align: center;
      color: #4d4d4d;
      font-size: 1.5em;
      padding: 20px 0;
      text-decoration: none;
    }
    .login-form input[type="password"],
    .login-form input[type="text"] {
      width: 100%;
      padding: 15px;
      border: 1px solid #dddddd;
      margin-bottom: 15px;
    }
    .login-form input[type="submit"] {
      width: 100%;
      padding: 15px;
      background-color: #535b63;
      border: 0;
      cursor: pointer;
      font-weight: bold;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">home</a>
    |
    <a href="login.html">login</a>
  </nav>

  <div class="container">
    <div class="content">
      <span style="padding: 12px;">
        <img src="/markup_166.png" alt="Rock Hard Geology Conglomerate" width="75%">
      </span>
    </div>
  </div>

</body>
</html>
